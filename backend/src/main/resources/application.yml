spring:
  application:
    name: finki-scheduler

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finki_scheduler}
    username: ${SPRING_DATASOURCE_USERNAME:finki}
    password: ${SPRING_DATASOURCE_PASSWORD:finki}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration-hours: 24

edupage:
  base-url: https://finki.edupage.org
  gsh: ${EDUPAGE_GSH:00000000}
  edition-year: ${EDUPAGE_EDITION_YEAR:2025}
  # Extra edition numbers ingested alongside the current one (comma-separated),
  # e.g. the winter timetable so both semesters' subjects are available.
  extra-editions: ${EDUPAGE_EXTRA_EDITIONS:26}

consultations:
  base-url: https://consultations.finki.ukim.mk
  scrape-delay-ms: 500
  user-agent: "FINKIApp/1.0 (student schedule aggregator; open-source)"

logging:
  level:
    com.finki.scheduler: INFO
    com.finki.scheduler.service.ingestion: DEBUG
