services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: finki_scheduler
      POSTGRES_USER: finki
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finki -d finki_scheduler"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/finki_scheduler
      SPRING_DATASOURCE_USERNAME: finki
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      EDUPAGE_GSH: ${EDUPAGE_GSH:-00000000}
      EDUPAGE_EDITION_YEAR: ${EDUPAGE_EDITION_YEAR:-2025}
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "3000:3000"

volumes:
  pgdata:
